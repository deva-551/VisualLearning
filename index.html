<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Learning Hub</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e0e0f0;min-height:100vh}
  .header{text-align:center;padding:60px 20px 40px;background:linear-gradient(135deg,#0a0a2e 0%,#1a1a4e 100%)}
  .header h1{font-size:2.8rem;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
  .header p{color:#8888aa;font-size:1.1rem;max-width:500px;margin:0 auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;padding:40px;max-width:1200px;margin:0 auto}
  .card{background:linear-gradient(145deg,#12122a,#1a1a3e);border:1px solid #2a2a5e;border-radius:16px;padding:32px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
  .card:hover{transform:translateY(-4px);border-color:#6366f1;box-shadow:0 8px 30px rgba(99,102,241,.2)}
  .card.active{border-color:#6366f1}
  .card.coming-soon{opacity:.6;cursor:default;display:flex;align-items:center;justify-content:center}
  .card.coming-soon:hover{transform:none;border-color:#2a2a5e;box-shadow:none}
  .cs-label{font-size:.85rem;font-weight:700;letter-spacing:.1em;color:#f97316;text-align:center}
  .card-icon{width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;font-weight:bold}
  .card h3{font-size:1.3rem;margin-bottom:8px;color:#f0f0ff}
  .card p{color:#7777aa;font-size:.9rem;line-height:1.5}
  .badge{position:absolute;top:16px;right:16px;font-size:.7rem;padding:4px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .badge.live{background:rgba(34,197,94,.15);color:#22c55e}
  .badge.soon{background:rgba(255,255,255,.05);color:#555}
  .rag-icon{background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
  .tf-icon{background:linear-gradient(135deg,#f59e0b,#ef4444)}
  .cnn-icon{background:linear-gradient(135deg,#10b981,#06b6d4)}
  .att-icon{background:linear-gradient(135deg,#ec4899,#8b5cf6)}
  .diff-icon{background:linear-gradient(135deg,#14b8a6,#3b82f6)}
  .gnn-icon{background:linear-gradient(135deg,#f97316,#eab308)}
  a{text-decoration:none;color:inherit}
</style>
</head>
<body>
<div class="header">
  <h1>Visual Learning Hub</h1>
  <p>Understand complex concepts through interactive visual demonstrations. No walls of text — just see it, get it.</p>
</div>
<div class="grid">
  <a href="rag.html">
    <div class="card active">
      <span class="badge live">LIVE</span>
      <div class="card-icon rag-icon">RAG</div>
      <h3>Retrieval Augmented Generation</h3>
      <p>See how documents become vectors, how similarity search works, and how LLMs get grounded answers.</p>
    </div>
  </a>
  <div class="card coming-soon"><span class="cs-label">COMING SOON</span></div>
  <div class="card coming-soon"><span class="cs-label">COMING SOON</span></div>
</div>
</body>
</html>
